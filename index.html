<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SJPS · AdPush</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f2; --surface: #ffffff; --border: #e0ddd6;
      --text: #1a1917; --sub: #7a7670; --accent: #e05c1a;
      --ok: #2d8a4e; --err: #c0392b;
      --mono: 'DM Mono', monospace; --sans: 'Noto Sans TC', sans-serif;
      --r: 8px;
    }
    html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--sans); font-size:16px; overflow:hidden; }

    /* LOADING */
    #loading { position:fixed; inset:0; z-index:9000; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; transition:opacity 0.5s; }
    #loading.hide { opacity:0; pointer-events:none; }
    .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.85s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #loading p { font-size:15px; color:var(--sub); letter-spacing:2px; }

    /* SLIDESHOW */
    #slideshow { position:fixed; inset:0; background:#111; }
    .slide { position:absolute; inset:0; opacity:0; transition:opacity 0.8s ease; display:flex; align-items:center; justify-content:center; background:#111; }
    .slide.active { opacity:1; }
    .slide img { display:block; max-width:100%; max-height:100%; object-fit:contain; }
    .slide iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }

    /* HUD */
    #hud { position:fixed; inset:0; pointer-events:none; z-index:200; }
    #brand { position:absolute; top:16px; left:20px; font-family:var(--mono); font-size:12px; letter-spacing:3px; color:rgba(255,255,255,0.3); text-transform:uppercase; }
    #counter { position:absolute; bottom:22px; right:22px; font-family:var(--mono); font-size:14px; color:rgba(255,255,255,0.45); letter-spacing:2px; }
    #progress { position:absolute; bottom:0; left:0; height:3px; background:var(--accent); width:0%; box-shadow:0 0 12px rgba(224,92,26,0.6); }
    #dots { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:8px; }
    .dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.2); transition:background 0.3s,transform 0.3s; }
    .dot.active { background:var(--accent); transform:scale(1.6); }

    /* Hover controls */
    #slide-controls { position:absolute; bottom:52px; left:50%; transform:translateX(-50%); display:flex; gap:12px; opacity:0; transition:opacity 0.3s; pointer-events:all; }
    #hud:hover #slide-controls { opacity:1; }
    .ctrl-btn { background:rgba(255,255,255,0.92); border:none; width:46px; height:46px; border-radius:50%; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 14px rgba(0,0,0,0.25); transition:transform 0.15s; pointer-events:all; }
    .ctrl-btn:hover { transform:scale(1.12); }
    #admin-trigger { position:absolute; top:0; right:0; width:80px; height:80px; pointer-events:all; cursor:pointer; }

    /* SETUP */
    #setup-screen { position:fixed; inset:0; z-index:100; background:var(--bg); display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
    #setup-screen.show { display:flex; }
    .setup-logo { font-family:var(--mono); font-size:clamp(32px,7vw,84px); font-weight:300; letter-spacing:12px; color:var(--text); }
    .setup-logo em { color:var(--accent); font-style:normal; }
    .setup-desc { font-size:17px; color:var(--sub); }
    .setup-hint { margin-top:24px; display:flex; gap:20px; font-size:14px; color:#aaa8a2; }
    .setup-hint kbd { background:var(--surface); border:1.5px solid var(--border); padding:2px 10px; border-radius:4px; font-family:var(--mono); font-size:13px; }

    /* ADMIN OVERLAY */
    #admin-overlay { position:fixed; inset:0; z-index:5000; background:rgba(247,246,242,0.97); backdrop-filter:blur(20px); display:none; overflow-y:auto; }
    #admin-overlay.open { display:block; animation:fadein 0.2s ease; }
    @keyframes fadein { from { opacity:0; } }
    #admin-panel { max-width:720px; margin:0 auto; padding:44px 32px 80px; }

    .adm-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:44px; padding-bottom:20px; border-bottom:2px solid var(--border); }
    .adm-logo { font-family:var(--mono); font-size:14px; letter-spacing:3px; color:var(--accent); font-weight:500; }
    .adm-logo span { color:var(--sub); }
    #btn-close { background:var(--surface); border:1.5px solid var(--border); color:var(--text); font-family:var(--mono); font-size:13px; letter-spacing:1px; padding:10px 22px; cursor:pointer; border-radius:var(--r); transition:border-color 0.2s,color 0.2s; }
    #btn-close:hover { border-color:var(--accent); color:var(--accent); }

    .adm-section { margin-bottom:40px; }
    .adm-label { font-family:var(--mono); font-size:11px; letter-spacing:4px; color:var(--sub); text-transform:uppercase; padding-bottom:12px; border-bottom:1.5px solid var(--border); margin-bottom:22px; }

    .cfg-row { display:grid; grid-template-columns:150px 1fr; align-items:center; gap:10px; margin-bottom:14px; }
    .cfg-key { font-family:var(--mono); font-size:13px; color:var(--sub); }
    .cfg-val { background:var(--surface); border:1.5px solid var(--border); color:var(--text); font-family:var(--mono); font-size:13px; padding:11px 14px; border-radius:var(--r); outline:none; width:100%; transition:border-color 0.2s,box-shadow 0.2s; }
    .cfg-val:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(224,92,26,0.1); }

    .btn-primary { background:var(--accent); border:none; color:#fff; font-family:var(--mono); font-size:13px; font-weight:500; letter-spacing:1px; padding:12px 28px; cursor:pointer; border-radius:var(--r); transition:background 0.2s,transform 0.1s; }
    .btn-primary:hover { background:#c4481a; }
    .btn-primary:active { transform:scale(0.98); }
    .btn-ghost { background:var(--surface); border:1.5px solid var(--border); color:var(--text); font-family:var(--mono); font-size:13px; padding:11px 22px; cursor:pointer; border-radius:var(--r); transition:border-color 0.2s,color 0.2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
    .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
    .btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }

    #auth-status { margin-top:12px; font-size:15px; color:var(--sub); }
    #auth-status.ok { color:var(--ok); font-weight:500; }

    /* Drop zone */
    #drop-zone { border:2px dashed var(--border); background:var(--surface); padding:48px 24px; text-align:center; cursor:pointer; border-radius:var(--r); transition:border-color 0.2s,background 0.2s; }
    #drop-zone:hover, #drop-zone.over { border-color:var(--accent); background:#fff8f5; }
    #drop-zone .dz-icon { font-size:38px; margin-bottom:12px; }
    #drop-zone .dz-main { font-size:16px; color:var(--text); margin-bottom:8px; font-weight:500; }
    #drop-zone .dz-types { font-size:13px; color:var(--sub); font-family:var(--mono); }
    #file-input { display:none; }

    #upload-list { margin-top:14px; }
    .ul-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); font-size:14px; }
    .ul-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .ul-status { font-family:var(--mono); font-size:12px; flex-shrink:0; }
    .ul-status.uploading { color:var(--accent); }
    .ul-status.done { color:var(--ok); }
    .ul-status.error { color:var(--err); }

    .dl-item { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:var(--r); background:var(--surface); border:1.5px solid var(--border); margin-bottom:8px; font-size:14px; }
    .dl-icon { font-size:20px; flex-shrink:0; }
    .dl-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500; }
    .dl-type { font-family:var(--mono); font-size:11px; color:var(--sub); letter-spacing:1px; }
    .empty-list { font-size:15px; color:var(--sub); padding:8px 0; }

    /* Toast */
    #toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--text); color:#fff; padding:12px 26px; border-radius:var(--r); font-size:14px; z-index:9999; transition:transform 0.3s; pointer-events:none; white-space:nowrap; }
    #toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>載入媒體中…</p></div>
<div id="slideshow"></div>

<div id="hud">
  <div id="brand">SJPS · AdPush</div>
  <div id="counter"></div>
  <div id="progress"></div>
  <div id="dots"></div>
  <div id="slide-controls">
    <button class="ctrl-btn" onclick="prev()">‹</button>
    <button class="ctrl-btn" onclick="openAdmin()">⚙</button>
    <button class="ctrl-btn" onclick="next()">›</button>
  </div>
  <div id="admin-trigger"></div>
</div>

<div id="setup-screen">
  <div class="setup-logo">SJPS <em>·</em> AdPush</div>
  <div class="setup-desc">數位廣告播放系統</div>
  <div class="setup-hint">
    <span><kbd>A</kbd> 管理面板</span>
    <span><kbd>F</kbd> 全螢幕</span>
    <span><kbd>← →</kbd> 切換</span>
  </div>
</div>

<div id="admin-overlay">
  <div id="admin-panel">
    <div class="adm-header">
      <div class="adm-logo">SJPS <span>·</span> AdPush <span>/ 管理面板</span></div>
      <button id="btn-close">✕ 關閉</button>
    </div>

    <div class="adm-section">
      <div class="adm-label">系統設定 · Configuration</div>
      <div class="cfg-row">
        <span class="cfg-key">API 金鑰</span>
        <input class="cfg-val" id="inp-apikey" type="text" placeholder="AIzaSy...（Google Drive API Key）">
      </div>
      <div class="cfg-row">
        <span class="cfg-key">Client ID</span>
        <input class="cfg-val" id="inp-clientid" type="text" placeholder="xxx.apps.googleusercontent.com">
      </div>
      <div class="cfg-row">
        <span class="cfg-key">資料夾 ID</span>
        <input class="cfg-val" id="inp-folderid" type="text" placeholder="Google Drive 資料夾 ID">
      </div>
      <div class="cfg-row">
        <span class="cfg-key">每張秒數</span>
        <input class="cfg-val" id="inp-duration" type="number" placeholder="8" min="1" max="300">
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="saveConfig()">💾 儲存設定</button>
        <button class="btn-ghost" onclick="refreshFiles()">↺ 重新載入</button>
        <a class="btn-ghost" href="setup-guide.html" target="_blank">📖 設定教學</a>
      </div>
    </div>

    <div class="adm-section">
      <div class="adm-label">Google 帳號授權 · 上傳功能</div>
      <button class="btn-primary" id="btn-auth" onclick="handleAuth()">🔑 使用 Google 登入</button>
      <div id="auth-status">尚未登入 · 登入後才能上傳檔案到 Drive</div>
    </div>

    <div class="adm-section">
      <div class="adm-label">上傳媒體 · Upload</div>
      <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="dz-icon">📂</div>
        <div class="dz-main">拖曳檔案到這裡，或點擊選擇</div>
        <div class="dz-types">PNG · JPG · GIF · PDF · PPT · PPTX · MP4</div>
      </div>
      <input type="file" id="file-input" multiple accept=".png,.jpg,.jpeg,.gif,.webp,.pdf,.ppt,.pptx,.mp4,.mov">
      <div id="upload-list"></div>
    </div>

    <div class="adm-section">
      <div class="adm-label">目前媒體清單 · Drive Files</div>
      <div id="drive-list"><p class="empty-list">請先儲存設定後載入</p></div>
      <div class="btn-row" style="margin-top:16px">
        <button class="btn-ghost" onclick="refreshFiles()">↺ 重新整理</button>
        <button class="btn-ghost" onclick="window.open('https://drive.google.com/drive/folders/'+CONFIG.FOLDER_ID,'_blank')">📁 開啟 Drive 資料夾</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let CONFIG = { FOLDER_ID:'18_RG5qrn-8WVxyq6QwyNIW3afIMtKZGi', API_KEY:'AIzaSyDiKpm2ZZU7I2JO2XR6SPAWALvFgf0ifWU', CLIENT_ID:'488969442881-g1vrrsg5h6dbl3dirk23mm4iofsm5c36.apps.googleusercontent.com', SLIDE_DURATION:8, SCOPES:'https://www.googleapis.com/auth/drive.file' };
let slides=[], currentIdx=0, slideTimer=null, progressRaf=null, progressStart=null;
let adminOpen=false, tokenClient=null, accessToken=null, gapiReady=false;

window.addEventListener('DOMContentLoaded', () => {
  loadConfig(); setupKeyboard(); setupDropZone();
  document.getElementById('admin-trigger').addEventListener('click', openAdmin);
  document.getElementById('btn-close').addEventListener('click', closeAdmin);
});

window.onGapiLoad = function() {
  gapi.load('client', async () => {
    if (!CONFIG.API_KEY) { hideLoading(); showSetup(); return; }
    try {
      await gapi.client.init({ apiKey:CONFIG.API_KEY, discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
      gapiReady=true; await fetchAndBuildSlides();
    } catch(e) { console.error(e); hideLoading(); showSetup(); }
  });
};

function loadConfig() {
  try { const s=localStorage.getItem('sjps_cfg'); if(s) CONFIG={...CONFIG,...JSON.parse(s)}; } catch(e){}
  syncInputs();
}
function syncInputs() {
  document.getElementById('inp-apikey').value   = CONFIG.API_KEY||'';
  document.getElementById('inp-clientid').value = CONFIG.CLIENT_ID||'';
  document.getElementById('inp-folderid').value = CONFIG.FOLDER_ID||'';
  document.getElementById('inp-duration').value = CONFIG.SLIDE_DURATION||8;
}
function saveConfig() {
  CONFIG.API_KEY        = document.getElementById('inp-apikey').value.trim();
  CONFIG.CLIENT_ID      = document.getElementById('inp-clientid').value.trim();
  CONFIG.FOLDER_ID      = document.getElementById('inp-folderid').value.trim();
  CONFIG.SLIDE_DURATION = parseInt(document.getElementById('inp-duration').value)||8;
  localStorage.setItem('sjps_cfg', JSON.stringify(CONFIG));
  showToast('✓ 設定已儲存'); refreshFiles();
}

async function fetchAndBuildSlides() {
  if (!CONFIG.API_KEY||!CONFIG.FOLDER_ID) { hideLoading(); showSetup(); return; }
  try {
    const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=%27${CONFIG.FOLDER_ID}%27+in+parents+and+trashed%3Dfalse&fields=files(id,name,mimeType)&orderBy=name&pageSize=100&key=${CONFIG.API_KEY}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
    const data = await r.json();
    const all = data.files||[];
    slides = all.filter(f=>{ const m=f.mimeType||''; return m.startsWith('image/')||m==='application/pdf'||m.includes('presentationml')||m.includes('powerpoint')||m.startsWith('video/'); });
    updateDriveList(all); hideLoading();
    if (!slides.length) { showSetup(); return; }
    buildSlideEls(); startSlideshow();
    document.getElementById('setup-screen').classList.remove('show');
  } catch(e) {
    console.error(e); hideLoading(); showSetup();
    document.getElementById('drive-list').innerHTML=`<p class="empty-list" style="color:var(--err)">⚠ 無法讀取：${e.message}<br>請確認 API 金鑰正確，且資料夾已設為「公開」</p>`;
  }
}

async function refreshFiles() {
  clearTimeout(slideTimer); cancelAnimationFrame(progressRaf);
  document.getElementById('slideshow').innerHTML=''; document.getElementById('dots').innerHTML='';
  slides=[]; currentIdx=0;
  const l=document.getElementById('loading'); l.style.display='flex'; l.classList.remove('hide');
  if (CONFIG.API_KEY&&!gapiReady) { try { await gapi.client.init({apiKey:CONFIG.API_KEY,discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']}); gapiReady=true; } catch(e){} }
  await fetchAndBuildSlides();
}

function buildSlideEls() {
  const host=document.getElementById('slideshow'); host.innerHTML='';
  slides.forEach((file,i)=>{
    const div=document.createElement('div'); div.className='slide';
    const m=file.mimeType||'';
    if (m.startsWith('image/')) {
      const img=document.createElement('img');
      img.src=`https://drive.google.com/uc?export=view&id=${file.id}`; img.alt=file.name;
      div.appendChild(img);
    } else {
      const fr=document.createElement('iframe');
      fr.src=`https://drive.google.com/file/d/${file.id}/preview`;
      fr.setAttribute('allowfullscreen',''); fr.setAttribute('allow','autoplay'); div.appendChild(fr);
    }
    host.appendChild(div);
  });
  buildDots();
}
function buildDots() {
  const el=document.getElementById('dots'); el.innerHTML='';
  if (slides.length<=1) return;
  for (let i=0;i<Math.min(slides.length,30);i++) { const d=document.createElement('div'); d.className='dot'; el.appendChild(d); }
}

function startSlideshow() { goTo(0); }
function goTo(idx) {
  if (!slides.length) return;
  idx=((idx%slides.length)+slides.length)%slides.length; currentIdx=idx;
  document.querySelectorAll('.slide').forEach((s,i)=>s.classList.toggle('active',i===idx));
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  document.getElementById('counter').textContent=slides.length>1?`${String(idx+1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}`:'';
  scheduleNext();
}
function scheduleNext() {
  clearTimeout(slideTimer); cancelAnimationFrame(progressRaf);
  if (slides.length<=1) { document.getElementById('progress').style.width='0%'; return; }
  const dur=(CONFIG.SLIDE_DURATION||8)*1000;
  const bar=document.getElementById('progress'); bar.style.transition='none'; bar.style.width='0%';
  progressStart=performance.now();
  function tick(now) { bar.style.width=Math.min((now-progressStart)/dur*100,100)+'%'; if((now-progressStart)<dur) progressRaf=requestAnimationFrame(tick); }
  requestAnimationFrame(tick);
  slideTimer=setTimeout(()=>goTo(currentIdx+1),dur);
}
function next() { goTo(currentIdx+1); }
function prev() { goTo(currentIdx-1); }

function setupKeyboard() {
  document.addEventListener('keydown', e=>{
    if (adminOpen) { if(e.key==='Escape') closeAdmin(); return; }
    if (['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
    if (e.key==='ArrowRight'||e.key===' ') next();
    else if (e.key==='ArrowLeft') prev();
    else if (e.key==='a'||e.key==='A') openAdmin();
    else if (e.key==='f'||e.key==='F') toggleFS();
  });
  document.getElementById('slideshow').addEventListener('click',()=>{ if(!adminOpen) next(); });
}
function toggleFS() { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

function openAdmin() { adminOpen=true; clearTimeout(slideTimer); cancelAnimationFrame(progressRaf); document.getElementById('admin-overlay').classList.add('open'); }
function closeAdmin() { adminOpen=false; document.getElementById('admin-overlay').classList.remove('open'); if(slides.length>0) scheduleNext(); }

function handleAuth() {
  if (accessToken) {
    accessToken=null; document.getElementById('btn-auth').textContent='🔑 使用 Google 登入';
    const s=document.getElementById('auth-status'); s.textContent='已登出'; s.className=''; return;
  }
  if (!CONFIG.CLIENT_ID) { showToast('請先填入 OAuth Client ID'); return; }
  if (!tokenClient) {
    tokenClient=google.accounts.oauth2.initTokenClient({ client_id:CONFIG.CLIENT_ID, scope:CONFIG.SCOPES, callback:r=>{
      if(r.error){console.error(r);return;}
      accessToken=r.access_token; document.getElementById('btn-auth').textContent='🔓 登出 Google';
      const s=document.getElementById('auth-status'); s.textContent='✓ 已登入，可以上傳檔案'; s.className='ok';
    }});
  }
  tokenClient.requestAccessToken();
}

function setupDropZone() {
  const dz=document.getElementById('drop-zone'), fi=document.getElementById('file-input');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');handleFiles(e.dataTransfer.files);});
  fi.addEventListener('change',()=>handleFiles(fi.files));
}
function handleFiles(list) { if(!accessToken){showToast('請先登入 Google 帳號');return;} Array.from(list).forEach(uploadFile); }
async function uploadFile(file) {
  const ul=document.getElementById('upload-list');
  const item=document.createElement('div'); item.className='ul-item';
  item.innerHTML=`<span class="ul-name">${file.name}</span><span class="ul-status uploading">上傳中…</span>`;
  ul.prepend(item); const st=item.querySelector('.ul-status');
  try {
    const meta={name:file.name,parents:[CONFIG.FOLDER_ID]};
    const form=new FormData();
    form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
    form.append('file',file);
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
      {method:'POST',headers:{Authorization:`Bearer ${accessToken}`},body:form});
    if(!r.ok) throw new Error((await r.json()).error?.message||r.statusText);
    st.textContent='✓ 完成'; st.className='ul-status done'; showToast(`✓ ${file.name} 上傳完成`);
    setTimeout(refreshFiles,1500);
  } catch(e) { st.textContent='✗ 失敗'; st.className='ul-status error'; showToast(`✗ 失敗：${e.message}`); }
}

function updateDriveList(files) {
  const el=document.getElementById('drive-list');
  if (!files.length) { el.innerHTML='<p class="empty-list">資料夾內尚無媒體檔案</p>'; return; }
  const icon=m=>{ if(m.startsWith('image/'))return'🖼️'; if(m.includes('pdf'))return'📄'; if(m.includes('presentation')||m.includes('powerpoint'))return'📊'; if(m.startsWith('video/'))return'🎬'; return'📁'; };
  el.innerHTML=files.map(f=>`<div class="dl-item"><span class="dl-icon">${icon(f.mimeType)}</span><span class="dl-name">${f.name}</span><span class="dl-type">${(f.mimeType||'').split('/').pop().toUpperCase()}</span></div>`).join('');
}

function hideLoading() { const el=document.getElementById('loading'); el.classList.add('hide'); setTimeout(()=>el.style.display='none',500); }
function showSetup() { document.getElementById('setup-screen').classList.add('show'); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }
</script>
